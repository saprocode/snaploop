name: SnapLoop — Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Surum numarasi (ornek: 2.1.0)'
        required: true
        default: '2.1.0'

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NSIS
        run: choco install nsis --yes
        shell: cmd

      - name: Build exe
        run: python build.py
        shell: cmd

      - name: Create installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis installer_windows.nsi
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: SnapLoop-Windows
          path: SnapLoop_Setup_*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build app
        run: python3 build.py

      - name: Create DMG
        run: |
          brew install create-dmg
          bash create_dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: SnapLoop-macOS
          path: "*.dmg"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-tk wmctrl dpkg-dev

      - name: Build binary
        run: python3 build.py

      - name: Create deb package
        run: bash create_deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: SnapLoop-Linux
          path: "*.deb"

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Get version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: SnapLoop v${{ steps.ver.outputs.VERSION }}
          files: |
            SnapLoop-Windows/**
            SnapLoop-macOS/**
            SnapLoop-Linux/**
          body: |
            ## SnapLoop v${{ steps.ver.outputs.VERSION }}

            | Platform | Dosya |
            |----------|-------|
            | Windows  | SnapLoop_Setup_*.exe |
            | macOS    | SnapLoop_*.dmg |
            | Linux    | SnapLoop_*_amd64.deb |
